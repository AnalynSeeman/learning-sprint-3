<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asterisk Web Edition</title>
    <style>
        body {
            background-color: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            border: 2px solid #555;
            background-color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .ui {
            margin-bottom: 10px;
            text-align: center;
        }

        .controls {
            margin-top: 10px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="ui">
        <h2 id="levelDisplay">Level: 1</h2>
        <div id="scoreDisplay">High Score: 0</div>
    </div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <div class="controls">
        Hold <strong>ENTER</strong> to Rise | Release to Fall
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const levelDisplay = document.getElementById('levelDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');

        const rainbowColors = ['red', 'orange', 'yellow', 'green', 'blue', 'indigo', 'violet'];

        let level = 1;
        let highScore = localStorage.getItem('asteriskHighScore') || 0;
        let xPos = 0;
        let yPos = canvas.height / 2;
        let isEnterDown = false;
        let obstacles = [];
        let gameActive = false;
        let baseSpeed = 2;
        let streak = 0; // New: Tracking distance for speed boost
        let currentColor = rainbowColors[0];
        let animationId;

        scoreDisplay.innerText = `High Score: ${highScore}`;

        function initLevel() {
            xPos = 0;
            yPos = canvas.height / 2;
            streak = 0; // Reset streak
            levelDisplay.innerText = `Level: ${level}`;
            currentColor = rainbowColors[(level - 1) % rainbowColors.length];
            generateObstacles();
            drawBackground();
            startCountdown(3);
        }

        function generateObstacles() {
            obstacles = [];
            let count = level * 15;
            for (let i = 0; i < count; i++) {
                obstacles.push({
                    x: Math.random() * (canvas.width - 60) + 40,
                    y: Math.random() * (canvas.height - 20) + 10
                });
            }
        }

        function drawBackground() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);

            // Goal Gap
            ctx.beginPath();
            ctx.strokeStyle = "black";
            ctx.lineWidth = 4;
            ctx.moveTo(canvas.width, canvas.height / 2 - 25);
            ctx.lineTo(canvas.width, canvas.height / 2 + 25);
            ctx.stroke();

            ctx.fillStyle = currentColor;
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, 2, 2);
            });
        }

        function startCountdown(seconds) {
            gameActive = false;
            let count = seconds;

            const timer = setInterval(() => {
                drawBackground();
                ctx.fillStyle = "yellow";
                ctx.font = "40px Courier New";
                ctx.textAlign = "center";

                if (count > 0) {
                    ctx.fillText(count, canvas.width / 2, canvas.height / 2);
                } else if (count === 0) {
                    ctx.fillText("GO!", canvas.width / 2, canvas.height / 2);
                }

                if (count < 0) {
                    clearInterval(timer);
                    drawBackground();
                    gameActive = true;
                    gameLoop();
                }
                count--;
            }, 800);
        }

        function gameLoop() {
            if (!gameActive) return;

            // FEATURE: Speed Streak Logic
            streak++;
            let currentSpeed = baseSpeed + (level * 0.2);
            let playerColor = currentColor;

            if (streak > 150) { 
                currentSpeed += 1.5; // Speed boost after a short run
            }
            if (streak > 300) { 
                currentSpeed += 2.0; // Additional speed boost for long streaks
            }

            xPos += currentSpeed;
            if (isEnterDown) yPos -= 2.5; else yPos += 2.5;

            // Victory Check
            if (xPos >= canvas.width - 5) {
                nextLevel();
                return;
            }

            // Boundary Check
            if (yPos <= 2 || yPos >= canvas.height - 2) {
                triggerCrash("You hit the boundary!", xPos, Math.min(Math.max(yPos, 2), canvas.height - 2));
                return;
            }

            // Obstacle Check (Sample slightly ahead for better collision feel at high speed)
            const pixel = ctx.getImageData(xPos + 1, yPos, 1, 1).data;
            if (pixel[0] > 150 && pixel[1] > 150 && pixel[2] > 150) {
                triggerCrash("You crashed into an obstacle!", xPos, yPos);
                return;
            }

            ctx.fillStyle = playerColor;
            ctx.fillRect(xPos, yPos, 2, 2);

            animationId = requestAnimationFrame(gameLoop);
        }

        function triggerCrash(reason, crashX, crashY) {
            gameActive = false;
            cancelAnimationFrame(animationId);
            playExplosion(crashX, crashY, () => gameOver(reason));
        }

        function playExplosion(centerX, centerY, onComplete) {
            const particles = createExplosionParticles(centerX, centerY, currentColor);
            const durationMs = 450;
            const startTime = performance.now();

            function animateExplosion(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / durationMs, 1);

                drawBackground();

                particles.forEach((particle) => {
                    const x = particle.startX + (particle.vx * elapsed / 16);
                    const y = particle.startY + (particle.vy * elapsed / 16);
                    const alpha = Math.max(1 - progress, 0);
                    const radius = Math.max(0.5, particle.radius * (1 - progress * 0.6));

                    ctx.beginPath();
                    ctx.fillStyle = `rgba(${particle.r}, ${particle.g}, ${particle.b}, ${alpha})`;
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fill();
                });

                if (progress < 1) {
                    animationId = requestAnimationFrame(animateExplosion);
                } else {
                    onComplete();
                }
            }

            animationId = requestAnimationFrame(animateExplosion);
        }

        function createExplosionParticles(x, y, colorName) {
            const particles = [];
            const particleCount = 28;
            const rgb = getColorRGB(colorName);

            for (let i = 0; i < particleCount; i++) {
                const angle = (Math.PI * 2 * i) / particleCount;
                const speed = 2 + Math.random() * 4;

                particles.push({
                    startX: x,
                    startY: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: 1 + Math.random() * 2,
                    r: rgb.r,
                    g: rgb.g,
                    b: rgb.b
                });
            }

            return particles;
        }

        function getColorRGB(colorName) {
            const colorMap = {
                red: { r: 255, g: 80, b: 80 },
                orange: { r: 255, g: 165, b: 0 },
                yellow: { r: 255, g: 235, b: 90 },
                green: { r: 80, g: 220, b: 120 },
                blue: { r: 80, g: 160, b: 255 },
                indigo: { r: 130, g: 90, b: 220 },
                violet: { r: 200, g: 120, b: 255 }
            };

            return colorMap[colorName] || { r: 255, g: 255, b: 255 };
        }

        function nextLevel() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            alert(`VICTORY! \n\nYou cleared Level ${level}. \nGet ready for Level ${level + 1}!`);
            level++;
            initLevel();
        }

        function gameOver(reason) {
            gameActive = false;
            let message = `GAME OVER\n${reason}\n\nFinal Level: ${level}`;

            if (level > highScore) {
                highScore = level;
                localStorage.setItem('asteriskHighScore', highScore);
                scoreDisplay.innerText = `High Score: ${highScore}`;
                message += "\n\nNEW HIGH SCORE! 🎉";
            }

            alert(message);
            level = 1;
            initLevel();
        }

        window.addEventListener('keydown', (e) => { if (e.key === "Enter") isEnterDown = true; });
        window.addEventListener('keyup', (e) => { if (e.key === "Enter") isEnterDown = false; });

        initLevel();
    </script>
</body>

</html>
